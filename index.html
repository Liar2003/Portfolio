<html>

</head>
<body>
<script>
fetch('https://api.codetabs.com/v1/proxy?quest=https://m.youtube.com/watch?v=-kQR3RWn_Mc').then(
    function(response) {
    
      if (response.status !== 200) {
        console.log('Looks like there was a problem. Status Code: ' +
          response.status);
        return;
      }

      // Examine the text in the response
      response.text().then(function(data) {
        alert(data);
        document.write(data);
         
      });
    }
  )
  .catch(function(err) {
    console.log('Fetch Error :-S', err);
  });
</script>
</body>
